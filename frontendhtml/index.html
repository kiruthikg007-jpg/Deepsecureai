<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Detector | Deepfake Detection System</title>
    
    <!-- SEO & Favicons -->
    <link rel="icon" type="image/png" href="./icons/favicon-32x32.png">
    <link rel="manifest" href="manifest.json">
    <meta name="description" content="State-of-the-art Deepfake detection using EfficientNetV2 and MTCNN. Analysis for images, videos, and audio.">
    <meta name="theme-color" content="#05070A">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Effects -->
    <div class="grid-bg"></div>
    <div class="bg-overlay"></div>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="cursor"></div>
    <div class="custom-cursor-dot" id="cursor-dot"></div>

    <div class="app">
        <!-- Header Section -->
        <header class="header">
            <div class="header-icon animate-pop">
                <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h1 class="header-title">DeepSecure AI</h1>
            <p class="header-subtitle">// Advanced Multimodal Detection System</p>
        </header>

        <!-- Main Card -->
        <main class="card reveal">
            <!-- Type Selection -->
            <section class="section">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
                    </svg>
                    01 Select Modality
                </h2>
                <div class="type-grid">
                    <button class="type-button active" data-type="image">
                        <svg class="type-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21,15 16,10 5,21"/>
                        </svg>
                        <span>Image</span>
                    </button>
                    <button class="type-button" data-type="video">
                        <svg class="type-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23,7 16,12 23,17 23,7"/>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                        </svg>
                        <span>Video</span>
                    </button>
                    <button class="type-button" data-type="audio">
                        <svg class="type-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                        <span>Audio</span>
                    </button>
                </div>
            </section>

            <!-- File Upload -->
            <section class="section">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    02 Upload Source
                </h2>

                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <div class="upload-content">
                        <div class="upload-icon-container" id="uploadIconContainer">
                            <svg class="upload-default-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7,10 12,15 17,10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                        </div>
                        <div class="upload-text" id="uploadText">
                            <p class="upload-main-text">DROP FILE TO SCAN</p>
                            <p class="upload-sub-text">PNG, JPG, MP4, WAV supported</p>
                        </div>
                    </div>
                </div>

                <!-- Preview UI -->
                <div class="file-preview reveal" id="filePreview" style="display: none;">
                    <div class="preview-header">
                        <h3 class="preview-title">SCANNING_BUFFER</h3>
                        <button class="remove-file-btn" id="removeFileBtn" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="preview-content" id="previewContent"></div>
                    <div class="file-details" id="fileDetails"></div>
                </div>
            </section>

            <!-- Action Section -->
            <section class="section">
                <button class="analyze-button" id="analyzeButton" disabled>
                    <div class="button-content" id="buttonContent">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 8v4l3 3"></path>
                        </svg>
                        <span>START ANALYSIS</span>
                    </div>
                </button>
            </section>
        </main>

        <!-- Final Results -->
        <div class="result-card reveal" id="resultCard" style="display: none;">
            <div class="result-content">
                <div class="result-icon" id="resultIcon"></div>
                <div class="result-text">
                    <h3 class="result-title">System Analysis Log</h3>
                    <p class="result-description" id="resultDescription"></p>
                </div>
            </div>
        </div>

        <!-- Footer & Attribution -->
        <footer class="footer reveal">
            <a href="#" class="author-link" onclick="return false;">
                &copy; Developed by Kiruhtik Vikram G Software developer
            </a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
